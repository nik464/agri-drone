---
# Data Configuration

dataset:
  name: crop_stress_v1
  version: 1.0
  splits:
    train: 0.7
    val: 0.15
    test: 0.15

augmentation:
  enabled: true
  spatial:
    - {type: Flip, p: 0.5}
    - {type: Rotate, limit: [-15, 15], p: 0.5}
    - {type: GaussNoise, p: 0.2}
    - {type: Blur, blur_limit: 3, p: 0.3}
  color:
    - {type: RandomBrightnessContrast, p: 0.2}
    - {type: Hue, p: 0.2}

normalization:
  mean: [0.485, 0.456, 0.406]  # ImageNet statistics
  std: [0.229, 0.224, 0.225]

preprocessing:
  input_size: 640
  format: RGB
  dtype: float32
