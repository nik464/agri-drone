# Quick matrix for Colab T4 (~2 h).
#
# 2 backbones x 2 data fractions x 2 folds x 1 dataset = 8 cells.
# Used by notebooks/colab/01_run_matrix.ipynb in the default "quick" mode.

seed: 42
tracker: none

training_recipe: docs/training_recipe.md@v1

backbones:
  - yolov8n_cls
  - efficientnet_b0

rule_engines:
  - none
  - handcrafted

train_fractions:
  - 1.0
  - 0.25

datasets:
  - plantvillage_21cls

cv_folds: 2
